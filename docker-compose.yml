version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tdr_qdrant
    ports:
      - '6333:6333' # REST API
      - '6334:6334' # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-} # Optional: set in .env if needed
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/health']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tdr_backend
    depends_on:
      - qdrant
    ports:
      - '8000:8000'
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:latest}
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local

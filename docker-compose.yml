version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tdr_qdrant
    ports:
      - '6333:6333' # REST API
      - '6334:6334' # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-} # Optional: set in .env if needed
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/health']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tdr_backend
    depends_on:
      - qdrant
    ports:
      - '8000:8000'
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # LLM provider: "ollama" (local) or "groq" (cloud). Set in .env.
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:latest}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Reranker is disabled by default because the model download is large and
      # unreliable on some connections, and it is slow on CPU. Set to True once
      # the model is fully cached (or on a GPU host) to enable reranking.
      - RERANK_ENABLED=${RERANK_ENABLED:-False}
      # Load ML models from the local HF cache without contacting the Hub.
      # The embedding model is already downloaded; this avoids a slow/hanging
      # network check on every model load (which caused 80s+ stalls / 502s).
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    volumes:
      # Bind-mount the real data directory so the container sees the raw PDFs
      # (served by /documents) and the ingested data, and so the SQLite chat
      # history (data/chat.db) persists on the host across restarts.
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tdr_frontend
    depends_on:
      - backend
    ports:
      - '3000:80'
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
